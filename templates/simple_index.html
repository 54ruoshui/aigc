<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>计算机网络知识图谱GraphRAG系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="header">
        <div class="container">
            <div class="row align-items-center">
                <div class="col-md-8">
                    <h1 class="mb-0">
                        <i class="fas fa-network-wired me-3"></i>
                        计算机网络知识图谱GraphRAG系统
                    </h1>
                    <p class="lead mb-0 mt-2">基于大语言模型的智能知识问答系统</p>
                </div>
                <div class="col-md-4 text-end">
                    <div class="stats-card">
                        <div class="stats-number" id="totalNodes">-</div>
                        <div class="text-muted">知识节点</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="container">
        <div class="row">
            <div class="col-lg-6">
                <div class="query-card">
                    <h3 class="mb-4">
                        <i class="fas fa-question-circle me-2"></i>
                        智能问答
                    </h3>
                    
                    <div class="example-questions">
                        <h6>示例问题：</h6>
                        <div class="example-questions-container">
                            <span class="example-question" onclick="askQuestion('TCP和UDP有什么区别？')">TCP和UDP有什么区别？</span>
                            <span class="example-question" onclick="askQuestion('HTTP和HTTPS的关系是什么？')">HTTP和HTTPS的关系是什么？</span>
                            <span class="example-question" onclick="askQuestion('路由器的工作原理是什么？')">路由器的工作原理是什么？</span>
                            <span class="example-question" onclick="askQuestion('如何解决网络环路问题？')">如何解决网络环路问题？</span>
                        </div>
                    </div>
                    
                    <div class="search-box">
                        <div class="input-group">
                            <input type="text" 
                                   class="form-control form-control-lg form-control-custom" 
                                   id="questionInput" 
                                   placeholder="请输入您的网络相关问题..."
                                   onkeypress="handleKeyPress(event)">
                            <button class="voice-btn" id="voiceBtn" onclick="toggleVoiceRecognition()" title="语音输入">
                                <i class="fas fa-microphone"></i>
                            </button>
                            <button class="btn btn-custom btn-lg" type="button" onclick="submitQuery()">
                                <i class="fas fa-search me-2"></i>提问
                            </button>
                        </div>
                        <div class="search-suggestions" id="searchSuggestions"></div>
                    </div>
                    
                    <div class="loading" id="loading">
                        <div class="spinner"></div>
                        <p>正在分析您的问题，请稍候...</p>
                    </div>
                </div>
                
                <div class="answer-card" id="answerCard">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <h4 class="mb-0">
                            <i class="fas fa-lightbulb me-2"></i>
                            答案
                        </h4>
                        <div class="btn-group" role="group">
                            <button class="btn btn-sm btn-outline-secondary" onclick="copyAnswer()" title="复制答案">
                                <i class="fas fa-copy"></i>
                            </button>
                            <button class="btn btn-sm btn-outline-secondary" onclick="shareAnswer()" title="分享">
                                <i class="fas fa-share"></i>
                            </button>
                        </div>
                    </div>
                    <div id="answerContent"></div>
                    <div class="mt-3 text-muted">
                        <small>
                            <i class="fas fa-clock me-1"></i>
                            处理时间：<span id="processingTime"></span>秒
                        </small>
                    </div>
                </div>
            </div>
            
            <div class="col-lg-6">
                <div class="graph-container">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <h4 class="mb-0">
                            <i class="fas fa-project-diagram me-2"></i>
                            知识图谱可视化
                        </h4>
                        <button class="btn btn-sm btn-outline-primary" onclick="exportGraph()" title="导出图谱">
                            <i class="fas fa-download"></i>
                        </button>
                    </div>
                    <div id="graph"></div>
                </div>
                
                <div class="mt-3">
                    <div class="row">
                        <div class="col-md-4">
                            <div class="stats-card">
                                <div class="stats-number" id="nodeCount">0</div>
                                <div class="text-muted">相关节点</div>
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="stats-card">
                                <div class="stats-number" id="edgeCount">0</div>
                                <div class="text-muted">关系连接</div>
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="stats-card">
                                <div class="stats-number" id="pathCount">0</div>
                                <div class="text-muted">路径数量</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
    <script>
        // 简化的JavaScript函数，确保基本功能正常工作
        let currentGraph = null;
        let simulation = null;

        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            console.log('页面加载完成');
            loadGraphStats();
            setupSearchSuggestions();
        });

        // 加载图统计信息
        async function loadGraphStats() {
            try {
                const response = await fetch('/api/graph_stats');
                const stats = await response.json();
                if (stats.totalNodes) {
                    document.getElementById('totalNodes').textContent = stats.totalNodes;
                }
            } catch (error) {
                console.error('加载统计信息失败:', error);
            }
        }

        // 设置搜索建议
        function setupSearchSuggestions() {
            const input = document.getElementById('questionInput');
            const suggestions = document.getElementById('searchSuggestions');
            
            input.addEventListener('input', async function() {
                const query = this.value.trim();
                if (query.length < 2) {
                    suggestions.style.display = 'none';
                    return;
                }
                
                try {
                    const response = await fetch(`/api/search_nodes?q=${encodeURIComponent(query)}`);
                    const data = await response.json();
                    
                    if (data.nodes && data.nodes.length > 0) {
                        suggestions.innerHTML = '';
                        data.nodes.slice(0, 5).forEach(node => {
                            const item = document.createElement('div');
                            item.className = 'suggestion-item';
                            item.textContent = `${node.name} (${node.type})`;
                            item.onclick = () => {
                                input.value = `关于${node.name}的问题`;
                                suggestions.style.display = 'none';
                            };
                            suggestions.appendChild(item);
                        });
                        suggestions.style.display = 'block';
                    } else {
                        suggestions.style.display = 'none';
                    }
                } catch (error) {
                    console.error('搜索建议失败:', error);
                }
            });
            
            // 点击其他地方隐藏建议
            document.addEventListener('click', function(e) {
                if (!input.contains(e.target) && !suggestions.contains(e.target)) {
                    suggestions.style.display = 'none';
                }
            });
        }

        // 处理回车键
        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                submitQuery();
            }
        }

        // 示例问题点击
        function askQuestion(question) {
            document.getElementById('questionInput').value = question;
            submitQuery();
        }

        // 提交查询
        async function submitQuery() {
            const question = document.getElementById('questionInput').value.trim();
            if (!question) {
                alert('请输入您的问题');
                return;
            }

            // 显示加载状态
            document.getElementById('loading').style.display = 'block';
            document.getElementById('answerCard').style.display = 'none';
            document.getElementById('searchSuggestions').style.display = 'none';

            try {
                const response = await fetch('/api/query', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ question: question })
                });

                const data = await response.json();
                
                if (response.ok) {
                    displayAnswer(data);
                    displayGraph(data.graph_data);
                } else {
                    throw new Error(data.error || '查询失败');
                }
            } catch (error) {
                console.error('查询失败:', error);
                document.getElementById('answerContent').innerHTML = `
                    <div class="alert alert-danger">
                        <i class="fas fa-exclamation-triangle me-2"></i>
                        ${error.message || '查询失败，请稍后再试'}
                    </div>
                `;
                document.getElementById('answerCard').style.display = 'block';
            } finally {
                document.getElementById('loading').style.display = 'none';
            }
        }

        // 显示答案
        function displayAnswer(data) {
            const answerContent = document.getElementById('answerContent');
            answerContent.innerHTML = `
                <div class="alert alert-info">
                    <strong>问题：</strong>${data.question}
                </div>
                <div class="mt-3 answer-content">
                    ${typeof formatAnswer !== 'undefined' ? formatAnswer(data.answer) : data.answer.replace(/\n/g, '<br>')}
                </div>
            `;
            
            document.getElementById('processingTime').textContent = data.processing_time ? data.processing_time.toFixed(2) : '未知';
            document.getElementById('answerCard').style.display = 'block';
        }

        // 显示图
        function displayGraph(graphData) {
            if (!graphData || !graphData.nodes) {
                return;
            }
            
            // 处理关系数据 - 将start/end转换为source/target
            const processedRelationships = [];
            if (graphData.relationships) {
                graphData.relationships.forEach(rel => {
                    if (rel.start && rel.end && rel.start.name && rel.end.name) {
                        processedRelationships.push({
                            source: rel.start.name,
                            target: rel.end.name,
                            type: rel.type || 'RELATED_TO'
                        });
                    }
                });
            }
            
            // 更新统计信息
            document.getElementById('nodeCount').textContent = graphData.nodes.length;
            document.getElementById('edgeCount').textContent = graphData.relationships ? graphData.relationships.length : 0;
            document.getElementById('pathCount').textContent = graphData.paths ? graphData.paths.length : 0;

            // 清除现有图
            d3.select('#graph').selectAll('*').remove();

            const width = document.getElementById('graph').clientWidth;
            const height = document.getElementById('graph').clientHeight;

            const svg = d3.select('#graph')
                .append('svg')
                .attr('width', width)
                .attr('height', height);

            // 创建力导向图
            simulation = d3.forceSimulation(graphData.nodes)
                .force('link', d3.forceLink(graphData.relationships).id(d => d.name).distance(100))
                .force('charge', d3.forceManyBody().strength(-300))
                .force('center', d3.forceCenter(width / 2, height / 2))
                .force('collision', d3.forceCollide().radius(30));

            // 创建箭头标记
            svg.append('defs').selectAll('marker')
                .data(['arrow'])
                .enter().append('marker')
                .attr('id', d => d)
                .attr('viewBox', '0 -5 10 10')
                .attr('refX', 15)
                .attr('refY', -1.5)
                .attr('markerWidth', 6)
                .attr('markerHeight', 6)
                .attr('orient', 'auto')
                .append('path')
                .attr('d', 'M0,-5L10,0L0,5')
                .attr('fill', '#999');

            // 创建关系线
            const link = svg.append('g')
                .selectAll('line')
                .data(processedRelationships)
                .enter().append('line')
                .attr('class', 'link')
                .attr('marker-end', 'url(#arrow)');

            // 创建节点组
            const node = svg.append('g')
                .selectAll('.node')
                .data(graphData.nodes)
                .enter().append('g')
                .attr('class', 'node')
                .call(d3.drag()
                    .on('start', dragstarted)
                    .on('drag', dragged)
                    .on('end', dragended));

            // 添加节点圆圈
            node.append('circle')
                .attr('r', 15)
                .attr('fill', d => getNodeColor(d.type))
                .attr('stroke', '#fff')
                .on('click', showNodeDetails);

            // 添加节点标签
            node.append('text')
                .attr('class', 'node-label')
                .attr('dy', -20)
                .attr('text-anchor', 'middle')
                .text(d => d.name.length > 10 ? d.name.substring(0, 10) + '...' : d.name);

            // 更新位置
            simulation.on('tick', () => {
                link
                    .attr('x1', d => d.source.x)
                    .attr('y1', d => d.source.y)
                    .attr('x2', d => d.target.x)
                    .attr('y2', d => d.target.y);

                node
                    .attr('transform', d => `translate(${d.x},${d.y})`);
            });

            // 拖拽函数
            function dragstarted(event, d) {
                if (!event.active) simulation.alphaTarget(0.3).restart();
                d.fx = d.x;
                d.fy = d.y;
            }

            function dragged(event, d) {
                d.fx = event.x;
                d.fy = event.y;
            }

            function dragended(event, d) {
                if (!event.active) simulation.alphaTarget(0);
                d.fx = null;
                d.fy = null;
            }

            // 显示节点详情
            function showNodeDetails(event, d) {
                alert(`节点: ${d.name}\n类型: ${d.type}`);
            }
        }

        // 获取节点颜色
        function getNodeColor(type) {
            const colors = {
                'Protocol': '#ff6b6b',
                'Device': '#4ecdc4',
                'Layer': '#45b7d1',
                'Knowledge': '#96ceb4',
                'SecurityConcept': '#feca57',
                'NetworkType': '#ff9ff3',
                'Model': '#54a0ff',
                'Function': '#48dbfb',
                'Topology': '#1dd1a1',
                'Problem': '#ee5a24',
                'Solution': '#10ac84'
            };
            return colors[type] || '#95a5a6';
        }

        // 简化的功能函数
        function toggleVoiceRecognition() {
            alert('语音识别功能需要您的浏览器支持Web Speech API');
        }

        function copyAnswer() {
            const answerText = document.getElementById('answerContent').textContent;
            navigator.clipboard.writeText(answerText).then(() => {
                alert('答案已复制到剪贴板');
            });
        }

        function shareAnswer() {
            alert('分享功能');
        }

        function exportGraph() {
            alert('导出图谱功能');
        }
    </script>
</body>
</html>
