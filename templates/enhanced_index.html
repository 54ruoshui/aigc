<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>增强版GraphRAG知识图谱系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
    <style>
        /* 验证相关样式 */
        .validation-toggle {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
            padding: 10px;
            background-color: #f8f9fa;
            border-radius: 5px;
        }
        
        .validation-toggle .switch {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 24px;
            margin-right: 10px;
        }
        
        .validation-toggle .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        
        .validation-toggle .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            transition: .4s;
            border-radius: 24px;
        }
        
        .validation-toggle .slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }
        
        .validation-toggle input:checked + .slider {
            background-color: #2196F3;
        }
        
        .validation-toggle input:checked + .slider:before {
            transform: translateX(26px);
        }
        
        .validation-info {
            margin-left: 10px;
            color: #6c757d;
            font-size: 0.9em;
        }
        
        .validation-only {
            display: block;
        }
        
        .keyword-item.valid, .relationship-item.valid {
            border-left: 4px solid #28a745;
            background-color: #f8fff9;
        }
        
        .keyword-item.invalid, .relationship-item.invalid {
            border-left: 4px solid #dc3545;
            background-color: #fff8f8;
        }
        
        .validation-icon {
            margin-left: auto;
            font-size: 1.2em;
        }
        
        .validation-details {
            margin-top: 5px;
            padding: 5px;
            background-color: #f8f9fa;
            border-radius: 3px;
            font-size: 0.9em;
        }
        
        .validation-suggestions {
            margin-top: 3px;
            color: #6c757d;
        }
        
        .feedback-section {
            margin-top: 20px;
            padding: 15px;
            background-color: #f8f9fa;
            border-radius: 5px;
        }
        
        .feedback-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }
        
        .feedback-form textarea {
            width: 100%;
            min-height: 80px;
            margin-bottom: 10px;
        }
        
        .validation-stats {
            margin-top: 15px;
            padding: 15px;
            background-color: #e9ecef;
            border-radius: 5px;
        }
        
        .validation-metrics {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 10px;
            margin-bottom: 10px;
        }
        
        .metric {
            display: flex;
            justify-content: space-between;
            padding: 5px 10px;
            background-color: white;
            border-radius: 3px;
        }
        
        .metric-label {
            font-weight: bold;
        }
        
        .metric-value {
            color: #007bff;
        }
        
        .extraction-summary {
            margin-bottom: 20px;
            padding: 15px;
            background-color: #e9ecef;
            border-radius: 5px;
        }
        
        .summary-info p {
            margin-bottom: 5px;
        }
        
        .explanation {
            color: #6c757d;
            font-style: italic;
        }
        
        .stats-section, .validation-section, .keywords-section, .relationships-section {
            margin-bottom: 20px;
            padding: 15px;
            border: 1px solid #dee2e6;
            border-radius: 5px;
        }
        
        .stats-grid, .validation-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 10px;
        }
        
        .stat-item, .validation-item {
            display: flex;
            justify-content: space-between;
            padding: 8px;
            background-color: #f8f9fa;
            border-radius: 3px;
        }
        
        .keywords-list, .relationships-list {
            max-height: 400px;
            overflow-y: auto;
        }
        
        .keyword-item, .relationship-item {
            margin-bottom: 10px;
            padding: 10px;
            border: 1px solid #dee2e6;
            border-radius: 5px;
        }
        
        .keyword-header, .relationship-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 5px;
        }
        
        .keyword-name, .relationship-source, .relationship-target {
            font-weight: bold;
        }
        
        .keyword-type, .relationship-type {
            background-color: #007bff;
            color: white;
            padding: 2px 6px;
            border-radius: 3px;
            font-size: 0.8em;
        }
        
        .keyword-confidence, .relationship-confidence {
            color: #6c757d;
            font-size: 0.9em;
        }
        
        .keyword-description, .relationship-description {
            color: #495057;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="#">
                <i class="fas fa-project-diagram"></i>
                增强版GraphRAG知识图谱系统
            </a>
            <div class="navbar-nav ms-auto">
                <span class="navbar-text">
                    <i class="fas fa-shield-alt text-success"></i>
                    技能验证已启用
                </span>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row">
            <!-- 左侧：输入区域 -->
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header">
                        <h5><i class="fas fa-edit"></i> 知识点提取</h5>
                    </div>
                    <div class="card-body">
                        <div class="mb-3">
                            <label for="content-input" class="form-label">输入内容</label>
                            <textarea class="form-control" id="content-input" rows="10" 
                                placeholder="请输入要提取知识点的文本内容..."></textarea>
                        </div>
                        
                        <div class="mb-3">
                            <label for="file-input" class="form-label">或上传文件</label>
                            <input type="file" class="form-control" id="file-input" 
                                accept=".txt,.md,.doc,.docx,.pdf">
                        </div>
                        
                        <div class="extraction-area">
                            <div class="validation-toggle">
                                <label class="switch">
                                    <input type="checkbox" id="use-validation" checked>
                                    <span class="slider"></span>
                                </label>
                                <span>启用技能验证</span>
                                <small class="validation-info">自动过滤无效知识点和关系</small>
                            </div>
                            
                            <button class="btn btn-primary" id="extract-btn">
                                <i class="fas fa-magic"></i> 提取知识点
                            </button>
                        </div>
                    </div>
                </div>
                
                <!-- 验证统计 -->
                <div class="card mt-3 validation-stats validation-only">
                    <div class="card-header">
                        <h6><i class="fas fa-chart-bar"></i> 验证统计</h6>
                    </div>
                    <div class="card-body">
                        <div class="validation-metrics">
                            <div class="metric">
                                <span class="metric-label">验证通过率:</span>
                                <span class="metric-value" id="validity-rate">-</span>
                            </div>
                            <div class="metric">
                                <span class="metric-label">总验证数:</span>
                                <span class="metric-value" id="total-validations">-</span>
                            </div>
                            <div class="metric">
                                <span class="metric-label">平均置信度:</span>
                                <span class="metric-value" id="avg-confidence">-</span>
                            </div>
                        </div>
                        <button class="btn btn-sm btn-secondary" id="refresh-stats">
                            <i class="fas fa-sync-alt"></i> 刷新统计
                        </button>
                    </div>
                </div>
            </div>
            
            <!-- 右侧：结果区域 -->
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header">
                        <h5><i class="fas fa-list"></i> 提取结果</h5>
                    </div>
                    <div class="card-body">
                        <div id="extraction-results">
                            <div class="text-center text-muted">
                                <i class="fas fa-info-circle fa-2x mb-3"></i>
                                <p>请在左侧输入内容并点击"提取知识点"按钮</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- 底部：系统状态 -->
        <div class="row mt-4">
            <div class="col-12">
                <div class="card">
                    <div class="card-header">
                        <h6><i class="fas fa-heartbeat"></i> 系统状态</h6>
                    </div>
                    <div class="card-body">
                        <div class="row">
                            <div class="col-md-3">
                                <div class="text-center">
                                    <i class="fas fa-server fa-2x text-primary"></i>
                                    <p class="mt-2">后端服务</p>
                                    <span class="badge bg-success" id="backend-status">运行中</span>
                                </div>
                            </div>
                            <div class="col-md-3">
                                <div class="text-center">
                                    <i class="fas fa-database fa-2x text-success"></i>
                                    <p class="mt-2">数据库</p>
                                    <span class="badge bg-success" id="db-status">连接正常</span>
                                </div>
                            </div>
                            <div class="col-md-3">
                                <div class="text-center">
                                    <i class="fas fa-shield-alt fa-2x text-warning"></i>
                                    <p class="mt-2">技能验证</p>
                                    <span class="badge bg-success" id="validation-status">已启用</span>
                                </div>
                            </div>
                            <div class="col-md-3">
                                <div class="text-center">
                                    <i class="fas fa-brain fa-2x text-info"></i>
                                    <p class="mt-2">AI模型</p>
                                    <span class="badge bg-success" id="ai-status">就绪</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/enhanced-knowledge-extraction.js') }}"></script>
    
    <script>
        // 检查系统状态
        async function checkSystemStatus() {
            try {
                const response = await fetch('/api/health');
                const status = await response.json();
                
                // 更新状态显示
                document.getElementById('backend-status').textContent = 
                    status.status === 'healthy' ? '运行中' : '异常';
                document.getElementById('backend-status').className = 
                    status.status === 'healthy' ? 'badge bg-success' : 'badge bg-danger';
                
                document.getElementById('validation-status').textContent = 
                    status.skill_validation_enabled ? '已启用' : '已禁用';
                document.getElementById('validation-status').className = 
                    status.skill_validation_enabled ? 'badge bg-success' : 'badge bg-secondary';
                
            } catch (error) {
                console.error('检查系统状态失败:', error);
                document.getElementById('backend-status').textContent = '连接失败';
                document.getElementById('backend-status').className = 'badge bg-danger';
            }
        }
        
        // 页面加载时检查状态
        document.addEventListener('DOMContentLoaded', checkSystemStatus);
        
        // 定期检查状态
        setInterval(checkSystemStatus, 30000); // 每30秒检查一次
    </script>
</body>
</html>
