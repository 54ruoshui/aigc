<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>计算机网络知识图谱GraphRAG系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="{{ url_for('static', filename='js/neo4j-graph.js') }}"></script>
    <script src="{{ url_for('static', filename='js/graph-performance.js') }}"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <!-- 内联样式已移至外部CSS文件 -->
</head>
<body>
    <div class="header">
        <div class="container">
            <div class="row align-items-center">
                <div class="col-md-8">
                    <h1 class="mb-0">
                        <i class="fas fa-network-wired me-3"></i>
                        计算机网络知识图谱GraphRAG系统
                    </h1>
                    <p class="lead mb-0 mt-2">基于大语言模型的智能知识问答系统</p>
                </div>
                <div class="col-md-4 text-end">
                    <div class="stats-card">
                        <div class="stats-number" id="totalNodes">-</div>
                        <div class="text-muted">知识节点</div>
                    </div>
                </div>
            </div>
            <div class="row mt-3">
                <div class="col-12 text-end">
                    <button class="btn btn-sm btn-light me-2" id="themeBtn" onclick="toggleTheme()" title="切换主题">
                        <i class="fas fa-moon"></i>
                    </button>
                    <button class="btn btn-sm btn-light me-2" id="fullscreenBtn" onclick="toggleFullscreen()" title="全屏">
                        <i class="fas fa-expand"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- 消息提示容器 -->
    <div class="container mt-3">
        <div id="messageContainer"></div>
    </div>

    <div class="container">
        <div class="row">
            <div class="col-lg-6">
                <!-- 历史记录面板 -->
                <div class="history-panel" id="historyContainer" style="display: none;">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <h5 class="mb-0">
                            <i class="fas fa-history me-2"></i>
                            查询历史
                        </h5>
                        <button class="clear-history-btn" onclick="clearHistory()">
                            <i class="fas fa-trash me-1"></i>清空
                        </button>
                    </div>
                    <div id="historyList"></div>
                </div>

                <div class="query-card">
                    <h3 class="mb-4">
                        <i class="fas fa-question-circle me-2"></i>
                        智能问答
                    </h3>
                    
                    <div class="example-questions">
                        <h6>示例问题：</h6>
                        <div class="example-questions-container">
                            <span class="example-question" onclick="askQuestion('TCP和UDP有什么区别？')">TCP和UDP有什么区别？</span>
                            <span class="example-question" onclick="askQuestion('HTTP和HTTPS的关系是什么？')">HTTP和HTTPS的关系是什么？</span>
                            <span class="example-question" onclick="askQuestion('路由器的工作原理是什么？')">路由器的工作原理是什么？</span>
                            <span class="example-question" onclick="askQuestion('如何解决网络环路问题？')">如何解决网络环路问题？</span>
                            <span class="example-question" onclick="askQuestion('什么是VLAN，它有什么作用？')">什么是VLAN，它有什么作用？</span>
                            <span class="example-question" onclick="askQuestion('三次握手和四次挥手的过程是什么？')">三次握手和四次挥手的过程是什么？</span>
                            <span class="example-question" onclick="askQuestion('DNS解析的步骤有哪些？')">DNS解析的步骤有哪些？</span>
                            <span class="example-question" onclick="askQuestion('什么是子网掩码，如何计算？')">什么是子网掩码，如何计算？</span>
                        </div>
                    </div>
                    
                    <div class="search-box">
                        <div class="input-group">
                            <input type="text"
                                   class="form-control form-control-lg form-control-custom"
                                   id="questionInput"
                                   placeholder="请输入您的网络相关问题..."
                                   onkeypress="handleKeyPress(event)">
                            <button class="voice-btn" id="voiceBtn" onclick="toggleVoiceRecognition()" title="语音输入">
                                <i class="fas fa-microphone"></i>
                            </button>
                            <button class="btn btn-custom btn-lg" type="button" onclick="submitQuery()">
                                <i class="fas fa-search me-2"></i>提问
                            </button>
                        </div>
                        <div class="search-suggestions" id="searchSuggestions"></div>
                    </div>
                    
                    <div class="loading" id="loading">
                        <div class="spinner"></div>
                        <p>正在分析您的问题，请稍候...</p>
                    </div>
                </div>
                
                <div class="answer-card" id="answerCard">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <h4 class="mb-0">
                            <i class="fas fa-lightbulb me-2"></i>
                            答案
                        </h4>
                        <div class="btn-group" role="group">
                            <button class="btn btn-sm btn-outline-secondary" onclick="copyAnswer()" title="复制答案">
                                <i class="fas fa-copy"></i>
                            </button>
                            <button class="btn btn-sm btn-outline-secondary" onclick="shareAnswer()" title="分享">
                                <i class="fas fa-share"></i>
                            </button>
                        </div>
                    </div>
                    <div id="answerContent"></div>
                    <div class="mt-3 text-muted">
                        <small>
                            <i class="fas fa-clock me-1"></i>
                            处理时间：<span id="processingTime"></span>秒
                        </small>
                    </div>
                </div>
            </div>
            
            <div class="col-lg-6">
                <div class="graph-container">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <h4 class="mb-0">
                            <i class="fas fa-project-diagram me-2"></i>
                            Neo4j知识图谱
                        </h4>
                        <div class="btn-group" role="group">
                            <button class="btn btn-sm btn-outline-secondary" onclick="resetZoom()" title="重置视图">
                                <i class="fas fa-compress"></i>
                            </button>
                            <button class="btn btn-sm btn-outline-secondary" onclick="fitToScreen()" title="适应屏幕">
                                <i class="fas fa-expand-arrows-alt"></i>
                            </button>
                            <button class="btn btn-sm btn-outline-primary" onclick="exportGraph()" title="导出图谱">
                                <i class="fas fa-download"></i>
                            </button>
                        </div>
                    </div>
                    <div id="graph"></div>
                    <div class="mt-2 text-center">
                        <small class="text-muted">
                            <i class="fas fa-info-circle me-1"></i>
                            使用鼠标滚轮缩放，拖拽节点调整位置，点击节点查看详情
                        </small>
                    </div>
                </div>
                
                <div class="mt-3">
                    <div class="row">
                        <div class="col-md-4">
                            <div class="stats-card">
                                <div class="stats-number" id="nodeCount">0</div>
                                <div class="text-muted">相关节点</div>
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="stats-card">
                                <div class="stats-number" id="edgeCount">0</div>
                                <div class="text-muted">关系连接</div>
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="stats-card">
                                <div class="stats-number" id="pathCount">0</div>
                                <div class="text-muted">路径数量</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // 确保formatAnswer函数可用
        let formatAnswerRetryCount = 0;
        const maxRetries = 10;
        
        function waitForFormatAnswer(callback) {
            if (typeof formatAnswer !== 'undefined') {
                callback();
            } else if (formatAnswerRetryCount < maxRetries) {
                formatAnswerRetryCount++;
                setTimeout(() => waitForFormatAnswer(callback), 100);
            } else {
                console.error('formatAnswer函数加载失败');
                callback();
            }
        }

        // 处理回车键
        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                submitQuery();
            }
        }

        // 示例问题点击
        function askQuestion(question) {
            document.getElementById('questionInput').value = question;
            submitQuery();
        }

        // 提交查询
        async function submitQuery() {
            const question = document.getElementById('questionInput').value.trim();
            if (!question) {
                alert('请输入您的问题');
                return;
            }

            // 显示加载状态
            document.getElementById('loading').style.display = 'block';
            document.getElementById('answerCard').style.display = 'none';
            document.getElementById('searchSuggestions').style.display = 'none';

            try {
                const response = await fetch('/api/query', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ question: question })
                });

                const data = await response.json();

                if (response.ok) {
                    displayAnswer(data);
                    if (typeof displayEnhancedGraph !== 'undefined') {
                        displayEnhancedGraph(data.graph_data);
                    } else {
                        console.warn('displayEnhancedGraph 函数未定义');
                    }
                    
                    // 添加到历史记录
                    if (typeof addToHistory !== 'undefined') {
                        addToHistory(data.question, data.answer, data.processing_time);
                    }
                } else {
                    throw new Error(data.error || '查询失败');
                }
            } catch (error) {
                console.error('查询失败:', error);
                document.getElementById('answerContent').innerHTML = `
                    <div class="alert alert-danger">
                        <i class="fas fa-exclamation-triangle me-2"></i>
                        ${error.message || '查询失败，请稍后再试'}
                    </div>
                `;
                document.getElementById('answerCard').style.display = 'block';
            } finally {
                document.getElementById('loading').style.display = 'none';
            }
        }

        // 显示答案
        function displayAnswer(data) {
            const answerContent = document.getElementById('answerContent');
            
            // 确保formatAnswer函数可用，如果不可用则等待加载
            waitForFormatAnswer(() => {
                let formattedAnswer;
                if (typeof formatAnswer !== 'undefined') {
                    formattedAnswer = formatAnswer(data.answer);
                    console.log('使用formatAnswer函数格式化答案');
                } else {
                    // 如果还是不可用，使用简单的格式化
                    formattedAnswer = data.answer.replace(/\n/g, '<br>');
                    console.warn('formatAnswer函数不可用，使用简单格式化');
                }
                
                answerContent.innerHTML = `
                    <div class="alert alert-info">
                        <strong>问题：</strong>${data.question}
                    </div>
                    <div class="mt-3 answer-content">
                        ${formattedAnswer}
                    </div>
                `;
                
                document.getElementById('processingTime').textContent = data.processing_time !== undefined ? data.processing_time.toFixed(2) : '未知';
                document.getElementById('answerCard').style.display = 'block';
                
                // 添加显示动画
                document.getElementById('answerCard').classList.add('fade-in');
            });
        }

        function getNodeColor(type) {
            const colors = {
                'Protocol': '#ff6b6b',
                'Device': '#4ecdc4',
                'Layer': '#45b7d1',
                'Knowledge': '#96ceb4',
                'SecurityConcept': '#feca57',
                'NetworkType': '#ff9ff3',
                'Model': '#54a0ff',
                'Function': '#48dbfb',
                'Topology': '#1dd1a1',
                'Problem': '#ee5a24',
                'Solution': '#10ac84'
            };
            return colors[type] || '#95a5a6';
        }

        // 导出函数供HTML调用
        window.handleKeyPress = handleKeyPress;
        window.askQuestion = askQuestion;
        window.submitQuery = submitQuery;
        window.displayAnswer = displayAnswer;
        window.getNodeColor = getNodeColor;
    </script>
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
